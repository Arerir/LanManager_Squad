name: CI

on:
  pull_request:
    branches: [master]

jobs:
  test-api:
    name: API Tests (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/LanManager.Api.Tests/LanManager.Api.Tests.csproj

      - name: Build
        run: dotnet build src/LanManager.Api.Tests/LanManager.Api.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test src/LanManager.Api.Tests/LanManager.Api.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=results.trx" --results-directory ./test-results

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate HTML Coverage Report
        run: reportgenerator -reports:src/LanManager.Api.Tests/Coverage/coverage.cobertura.xml -targetdir:src/LanManager.Api.Tests/Coverage/html -reporttypes:Html

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/LanManager.Api.Tests/Coverage/html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results/*.trx

  build-api:
    name: Build API (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore src/LanManager.Api/LanManager.Api.csproj

      - name: Build
        run: dotnet build src/LanManager.Api/LanManager.Api.csproj --no-restore --configuration Release

  build-frontend:
    name: Build Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
